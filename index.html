<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prescouting</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    background:#0f1117;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:40px;
}

h1{
    color:#00ff88;
    margin-bottom:5px;
}

.subtitle{
    color:#888;
    margin-bottom:40px;
}

.card{
    background:#181c24;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    border:1px solid #2a2f3a;
}

.player{
    font-size:20px;
    font-weight:bold;
}

.club{
    color:#00ff88;
}

.prob{
    float:right;
    font-size:24px;
    font-weight:bold;
}

.score{
    color:#999;
    margin-top:8px;
}
    .sources-btn{
    margin-top:15px;
    background:#00ff88;
    color:#000;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.sources-btn:hover{
    opacity:0.9;
}
</style>

</head>

<body>

<h1>PRESCOUTING</h1>
<div class="subtitle">
Football Transfer Intelligence Platform
</div>

<div id="rumours">
Cargando rumores...
</div>

<script>

const supabaseUrl =
'https://micyipanemvjeilbjbyf.supabase.co';

const supabaseKey =
'sb_publishable_u0fUf9P8rCmghW299oXuCA_8WwKsCXY';

const client =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function loadRumours(){

const { data, error } = await client
.from('probabilities')
.select('*')
.order('probability', { ascending:false });

if(error){
document.getElementById("rumours").innerHTML =
"<p>Error cargando datos</p>";
console.log(error);
return;
}

let html = "";

data.forEach(item => {

html += `
<div class="card">

<div class="player">
${item.player_name}
<span class="prob">
${item.probability}%
</span>
</div>

<div class="club">
→ ${item.destination_club}
</div>

<div class="score">
Heat: ${item.heat_score}
|
Journalist: ${item.journalist_score}
|
Confidence: ${item.confidence_score}
</div>

<button
class="sources-btn"
onclick="showSources(${item.id})">
Ver fuentes
</button>

</div>
`;

});

document.getElementById("rumours").innerHTML = html;

}

loadRumours();
    async function showSources(rumourId){

const { data, error } = await client
.from('rumour_sources')
.select(`
source_title,
source_url,
impact_score
`)
.eq('rumour_id', rumourId)
.order('impact_score', { ascending:false });

if(error){
console.log(error);
alert(JSON.stringify(error));
return;
}

let text = '';

data.forEach(source => {

text +=
source.source_title +
' (Impacto: ' +
source.impact_score +
')\n';

});

alert(text);

}

</script>

</body>
</html>
